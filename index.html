<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>幸運數字小遊戲</title>
<style>
  body {
    font-family: "Microsoft JhengHei", sans-serif;
    background: #1e1e2f;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  h1 { margin-bottom: 10px; }
  #number {
    font-size: 80px;
    margin: 20px 0;
    transition: transform 0.2s;
  }
  button {
    font-size: 18px;
    padding: 10px 24px;
    border: none;
    border-radius: 8px;
    background: #ff6b6b;
    color: white;
    cursor: pointer;
  }
  button:hover { background: #ff4949; }
  #score { margin-top: 12px; font-size: 14px; color: #aaa; }
</style>
</head>
<body>
  <h1>🎲 幸運數字小遊戲</h1>
  <div id="number">?</div>
  <button id="rollBtn">擲一下！</button>
  <div id="score">已擲：0 次</div>

  <script>
    const numberEl = document.getElementById('number');
    const scoreEl = document.getElementById('score');
    const rollBtn = document.getElementById('rollBtn');
    let count = 0;

    rollBtn.addEventListener('click', () => {
      const result = Math.floor(Math.random() * 100) + 1;
      numberEl.textContent = result;
      numberEl.style.transform = 'scale(1.3)';
      setTimeout(() => { numberEl.style.transform = 'scale(1)'; }, 150);

      count++;
      scoreEl.textContent = `已擲：${count} 次`;

      if (result === 7 || result === 77) {
        numberEl.style.color = '#ffd93d';
      } else {
        numberEl.style.color = '#fff';
      }
    });
  </script>
</body>
</html>
